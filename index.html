<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f12" />
<title>Mis Coches</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mis Coches" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0d0f12;--bg2:#14171c;--panel:#1a1e24;--panel2:#20252d;
  --line:#2a3038;--line2:#353c46;
  --red:#e11d2a;--red-dark:#a3121c;--red-glow:rgba(225,29,42,.25);
  --chrome:#c9ced6;--chrome-dark:#8a919b;
  --ink:#f2f4f7;--muted:#9aa2ad;--muted2:#6b727c;
  --ok:#2fbd85;--ok-bg:rgba(47,189,133,.12);
  --warn:#e8a13a;--warn-bg:rgba(232,161,58,.12);
  --danger:#e14b4b;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit}
input,textarea{font-family:inherit;font-size:16px}
.display{font-family:'Rajdhani',sans-serif;letter-spacing:.02em}
.app-shell{max-width:640px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.demo-banner{background:rgba(225,29,42,.08);border-bottom:1px solid var(--line);color:var(--muted);font-size:11px;text-align:center;padding:6px 12px;letter-spacing:.03em}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(180deg,#14171c,#0d0f12);border-bottom:1px solid var(--line)}
.topbar .brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,#20252d,#0d0f12);border:1px solid var(--line2);display:grid;place-items:center}
.brand-mark svg{filter:drop-shadow(0 0 4px var(--red-glow))}
.brand-txt{line-height:1}
.brand-txt .t1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;letter-spacing:.06em}
.brand-txt .t1 span{color:var(--red)}
.brand-txt .t2{font-size:9px;letter-spacing:.22em;color:var(--muted2);text-transform:uppercase;margin-top:1px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(145deg,#2a3038,#14171c);border:1px solid var(--line2);color:var(--chrome);display:grid;place-items:center;font-size:12px;font-weight:600}
.icon-btn{background:none;border:none;color:var(--muted);padding:7px;border-radius:9px}
.icon-btn:hover{background:var(--panel);color:var(--ink)}
.content{padding:18px}
.car-tabs{display:flex;gap:12px;margin-bottom:22px}
.car-tab{flex:1;position:relative;display:flex;align-items:center;gap:11px;padding:14px;border-radius:var(--radius);background:linear-gradient(150deg,#1a1e24,#101317);border:1px solid var(--line);text-align:left;transition:.18s;overflow:hidden}
.car-tab::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:.18s}
.car-tab.active{border-color:var(--line2);box-shadow:0 0 0 1px var(--red-dark),0 8px 24px rgba(0,0,0,.4)}
.car-tab.active::before{background:var(--red);box-shadow:0 0 12px var(--red-glow)}
.car-tab .ct-ico{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:#0d0f12;border:1px solid var(--line2);color:var(--chrome);display:grid;place-items:center;overflow:hidden}
.car-tab .ct-ico img{width:100%;height:100%;object-fit:cover}
/* Garaje (menú principal) */
.garage-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}
.garage-title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;letter-spacing:.5px}
.garage-sub{color:var(--muted2);font-size:13px;margin-left:8px}
.add-car-btn{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);color:var(--chrome);font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s}
.add-car-btn:hover{border-color:var(--red);color:#fff}
.garage-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.garage-grid{grid-template-columns:1fr}}
.car-card{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-align:left;cursor:pointer;transition:border-color .15s,transform .1s}
.car-card:hover{border-color:var(--red)}
.car-card:active{transform:scale(.98)}
.cc-photo{width:100%;aspect-ratio:16/10;background:#0d0f12;overflow:hidden;position:relative}
.cc-dot{position:absolute;bottom:10px;right:10px;width:12px;height:12px;border-radius:50%;border:2px solid #0d0f12;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.cc-dot.ok{background:var(--ok)}
.cc-dot.warn{background:var(--warn)}
.cc-dot.danger{background:var(--danger)}
.cc-photo img{width:100%;height:100%;object-fit:cover}
.cc-noimg{width:100%;height:100%;display:grid;place-items:center;color:var(--line2)}
.cc-info{padding:12px 14px 14px}
.cc-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:.3px;margin-bottom:3px}
.cc-meta{color:var(--muted);font-size:12px}
.cc-km{color:var(--chrome);font-size:12px;font-weight:600;margin-top:6px}
/* Cabecera dentro de un coche */
.car-header{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:20px}
.ch-photo{width:54px;height:54px;border-radius:10px;overflow:hidden;background:#0d0f12;flex-shrink:0}
.ch-photo img{width:100%;height:100%;object-fit:cover}
.ch-info{flex:1;min-width:0}
.ch-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:.3px}
.ch-meta{color:var(--muted);font-size:12px;margin-top:2px}
.car-photo-edit{display:flex;align-items:center;gap:14px}
.car-photo-preview{width:72px;height:72px;border-radius:12px;background:#0d0f12;border:1px solid var(--line2);color:var(--chrome);display:grid;place-items:center;overflow:hidden;flex-shrink:0}
.car-photo-preview img{width:100%;height:100%;object-fit:cover}
.car-photo-actions{display:flex;flex-direction:column;gap:8px}
.btn.small{padding:8px 14px;font-size:13px}
.car-tab.active .ct-ico{color:var(--red)}
.car-tab .ct-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:.02em}
.car-tab .ct-meta{font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums;margin-top:1px}
.maintvsrep{display:flex;gap:0;margin-bottom:22px;background:#0d0f12;border:1px solid var(--line);border-radius:12px;padding:4px}
.alerts-ok{display:flex;align-items:center;gap:8px;color:var(--ok);font-size:13px;background:var(--ok-bg);border:1px solid rgba(47,189,133,.25);border-radius:12px;padding:11px 14px;margin-bottom:16px}
.alerts-box{border-radius:12px;margin-bottom:16px;overflow:hidden;border:1px solid var(--line)}
.alerts-box.has-danger{border-color:rgba(225,75,75,.4)}
.alerts-box.has-warn{border-color:rgba(232,161,58,.35)}
.alerts-head{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:none;padding:12px 14px;cursor:pointer;color:var(--text)}
.ah-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.alerts-box.has-danger .ah-left{color:var(--danger)}
.alerts-box.has-warn .ah-left{color:var(--warn)}
.ah-chev{transform:rotate(-90deg);transition:transform .2s;color:var(--muted2);display:flex}
.ah-chev.open{transform:rotate(90deg)}
.alerts-list{background:var(--panel);border-top:1px solid var(--line)}
.alert-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-top:1px solid rgba(255,255,255,.03)}
.alert-row:first-child{border-top:none}
.alert-row:hover{background:var(--panel2)}
.ar-ico{display:flex}
.ar-ico.danger{color:var(--danger)}
.ar-ico.warn{color:var(--warn)}
.ar-title{flex:1;font-size:14px}
.ar-label{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.ar-label.danger{background:rgba(225,75,75,.14);color:var(--danger)}
.ar-label.warn{background:var(--warn-bg);color:var(--warn)}
.mvr-btn{flex:1;padding:11px;border:none;background:transparent;border-radius:9px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:.15s}
.mvr-btn.active{background:linear-gradient(145deg,#e11d2a,#a3121c);color:#fff;box-shadow:0 3px 12px var(--red-glow)}
.subgroup{margin-bottom:22px}
.legend{display:flex;gap:16px;justify-content:center;margin:-6px 0 20px;font-size:11.5px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.legend .lg{width:8px;height:8px;border-radius:50%;display:inline-block}
.legend .lg.ok{background:var(--ok)}
.legend .lg.warn{background:var(--warn)}
.legend .lg.danger{background:var(--danger)}
.sg-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.sg-head .sg-bar{width:4px;height:16px;border-radius:2px;background:var(--chrome-dark)}
.sg-head h3{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome)}
.sg-head .sg-line{flex:1;height:1px;background:var(--line)}
.area-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.area-card{background:linear-gradient(160deg,#1a1e24,#13161b);border:1px solid var(--line);border-radius:var(--radius);padding:14px 10px;text-align:center;transition:.16s;position:relative}
.area-card:hover{border-color:var(--red-dark);transform:translateY(-2px)}
.area-card:active{transform:translateY(0)}
.area-card .ac-ico{width:40px;height:40px;margin:0 auto 8px;border-radius:11px;background:#0d0f12;border:1px solid var(--line2);display:grid;place-items:center;color:var(--chrome);transition:.16s}
.area-card:hover .ac-ico{color:var(--red);border-color:var(--red-dark)}
.area-card .ac-title{font-size:11.5px;font-weight:600;line-height:1.25}
.area-card .ac-badge{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%}
.area-card .ac-badge.ok{background:var(--ok)}
.area-card .ac-dot{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%}
.area-card .ac-dot.ok{background:var(--ok);box-shadow:0 0 7px rgba(47,189,133,.5)}
.area-card .ac-dot.warn{background:var(--warn);box-shadow:0 0 7px rgba(232,161,58,.55)}
.area-card .ac-dot.danger{background:var(--danger);box-shadow:0 0 8px rgba(225,75,75,.6)}
.area-card .ac-due{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;letter-spacing:.02em}
.area-card .ac-due.ok{background:var(--ok-bg);color:var(--ok)}
.area-card .ac-due.warn{background:var(--warn-bg);color:var(--warn)}
.area-card .ac-due.danger{background:rgba(225,75,75,.14);color:var(--danger)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-weight:600;font-size:15px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);transition:.15s}
.btn.primary{background:linear-gradient(145deg,#e11d2a,#a3121c);border:none;color:#fff;box-shadow:0 4px 16px var(--red-glow)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.block{width:100%}
.btn.ghost{background:transparent}
.rec{background:linear-gradient(160deg,#1a1e24,#13161b);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px;position:relative;overflow:hidden}
.rec::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line2)}
.rec.rep::before{background:var(--red)}
.rec-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.rec-date{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:.03em}
.rec-price{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:var(--red)}
.rec-meta{font-size:13px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 14px}
.rec-meta b{color:var(--chrome);font-weight:600}
.rec-notes{font-size:13px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);color:#c3c9d2;white-space:pre-wrap}
.rec-invoices{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.inv-thumb{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 10px;border:1px solid var(--line2);border-radius:8px;background:#0d0f12;color:var(--chrome)}
.rec-actions{display:flex;gap:8px;margin-top:13px}
.rec-actions .btn{padding:8px 14px;font-size:13px}
.due-banner{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:12px;margin-bottom:18px;font-size:13px}
.due-banner.ok{background:var(--ok-bg);border:1px solid rgba(47,189,133,.3);color:var(--ok)}
.due-banner.warn{background:var(--warn-bg);border:1px solid rgba(232,161,58,.3);color:var(--warn)}
.due-banner.danger{background:rgba(225,75,75,.12);border:1px solid rgba(225,75,75,.3);color:var(--danger)}
.due-banner b{font-family:'Rajdhani',sans-serif;font-weight:700}
.uploader{border:1.5px dashed var(--line2);border-radius:12px;padding:18px;text-align:center;color:var(--muted);background:#0d0f12}
.itv-hint{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:11px;margin-bottom:14px;font-size:13px;background:var(--ok-bg);border:1px solid rgba(47,189,133,.3);color:var(--ok)}
.itv-hint b{font-family:'Rajdhani',sans-serif;font-weight:700}
.itv-hint .itv-apply{margin-left:auto;flex-shrink:0;background:var(--ok);color:#04241a;border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:12px}
.reg-line{font-size:12px;color:var(--muted2);margin:-4px 0 16px;display:flex;align-items:center;gap:6px}
.reg-line b{color:var(--chrome);font-weight:600}
.toggle-row{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:14px;background:#0d0f12;border:1px solid var(--line2);border-radius:11px}
.toggle-txt{display:flex;flex-direction:column;line-height:1.3}
.toggle-txt b{font-size:13px;font-weight:600}
.toggle-txt span{font-size:11.5px;color:var(--muted2)}
.switch{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .track{position:absolute;inset:0;background:var(--line2);border-radius:20px;transition:.2s}
.switch .track::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.track{background:var(--red)}
.switch input:checked+.track::before{transform:translateX(18px)}
.sheet-overlay{position:fixed;inset:0;background:rgba(4,6,9,.72);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{position:relative;width:100%;max-width:640px;background:linear-gradient(180deg,#181c22,#0d0f12);border-top:1px solid var(--line2);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:8px 18px 28px}
.sheet-grip{width:42px;height:4px;background:var(--line2);border-radius:3px;margin:9px auto 16px}
.sheet-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:9px;background:#0d0f12;border:1px solid var(--line2);color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:color .15s,border-color .15s}
.sheet-close:hover{color:#fff;border-color:var(--red)}
/* Flujo Vengo del taller */
.visit-btn{margin-bottom:16px}
.visit-photo{display:flex;align-items:center;gap:14px}
.vp-preview{width:70px;height:70px;border-radius:12px;background:#0d0f12;border:1px solid var(--line2);color:var(--muted2);display:grid;place-items:center;overflow:hidden;flex-shrink:0}
.vp-preview img{width:100%;height:100%;object-fit:cover}
.vp-actions{display:flex;flex-direction:column;gap:8px}
.visit-select-head{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.3px;margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.vsh-count{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--red);background:rgba(225,75,75,.12);padding:2px 9px;border-radius:20px;letter-spacing:0}
.visit-group{margin-bottom:14px}
.vg-label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.visit-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vchip{position:relative;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer;text-align:left;color:var(--muted);transition:all .13s}
.vchip:hover{border-color:var(--line2)}
.vchip.on{background:rgba(225,75,75,.1);border-color:var(--red);color:#fff}
.vc-ico{display:flex;flex-shrink:0;color:var(--chrome)}
.vchip.on .vc-ico{color:var(--red)}
.vc-tt{font-size:13px;font-weight:500;flex:1}
.vc-check{display:flex;color:var(--red)}
.visit-details{margin-top:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.vd-head{background:#0d0f12;padding:10px 14px;font-size:12px;color:var(--muted);font-weight:600}
.vd-head span{color:var(--muted2);font-weight:400}
.vd-item{border-top:1px solid var(--line)}
.vd-row{width:100%;display:flex;align-items:center;gap:10px;background:var(--panel);border:none;padding:11px 14px;cursor:pointer;color:var(--text)}
.vd-ico{display:flex;color:var(--chrome)}
.vd-title{flex:1;text-align:left;font-size:13px}
.vd-chev{transform:rotate(-90deg);transition:transform .2s;color:var(--muted2);display:flex}
.vd-chev.open{transform:rotate(90deg)}
.vd-body{background:#0d0f12;padding:12px 14px}
/* Nota personal de categoría */
.catnote{display:flex;align-items:flex-start;gap:9px;background:rgba(201,162,75,.08);border:1px solid rgba(201,162,75,.3);border-radius:11px;padding:11px 13px;margin-bottom:18px;cursor:pointer}
.cn-ico{color:#c9a24b;display:flex;flex-shrink:0;margin-top:1px}
.cn-txt{flex:1;font-size:13px;color:#e8dcc0;line-height:1.4;white-space:pre-wrap}
.cn-edit{font-size:11px;color:var(--muted2);flex-shrink:0}
.catnote-add{display:inline-flex;align-items:center;gap:6px;background:none;border:1px dashed var(--line2);color:var(--muted2);font-size:12px;padding:8px 12px;border-radius:10px;margin-bottom:18px;cursor:pointer}
.catnote-add:hover{color:#c9a24b;border-color:rgba(201,162,75,.4)}
.catnote-edit{margin-bottom:18px}
.catnote-edit textarea{width:100%;min-height:72px;background:#0d0f12;border:1px solid rgba(201,162,75,.35);border-radius:11px;padding:11px 13px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical}
.catnote-actions{display:flex;gap:8px;margin-top:8px}
.area-records-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.area-records-head span{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.3px;color:var(--muted)}
.add-rec-btn{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line2);color:var(--chrome);font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer}
.add-rec-btn:hover{border-color:var(--red);color:#fff}
.sheet h2{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.sheet .sub{font-size:13px;color:var(--muted2);margin-bottom:20px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase}
.field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line2);border-radius:10px;background:#0d0f12;color:var(--ink)}

const fmtShort=d=>{const[y,m]=d.split('-');return meses[+m-1]+' '+y.slice(2)};

// Suma años a una fecha ISO (yyyy-mm-dd), maneja 29 feb
function addYearsISO(iso,n){
  const[y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y+n,m-1,d);
  if(dt.getMonth()!==m-1)dt.setDate(0);
  return dt.toISOString().slice(0,10);
}
const yearsBetween=(a,b)=>(new Date(b)-new Date(a))/(365.25*86400000);

// Próxima ITV para turismos privados (España):
// <4 años exento, 4-10 cada 2 años, >10 anual. La antigüedad manda.
function nextITV(regDate,itvDate){
  if(!regDate||!itvDate)return null;
  const edad=yearsBetween(regDate,itvDate);
  const diez=addYearsISO(regDate,10);
  if(edad<4)return{date:addYearsISO(regDate,4),reason:'primera ITV, a los 4 años de matriculación'};
  if(edad<10){
    const cand=addYearsISO(itvDate,2);
    if(cand>diez)return{date:diez,reason:'pasa a anual al cumplir 10 años'};
    return{date:cand,reason:'cada 2 años (coche de 4 a 10 años)'};
  }
  return{date:addYearsISO(itvDate,1),reason:'anual (coche de más de 10 años)'};
}

// Estado de una categoría. Devuelve {level:'ok'|'warn'|'danger'|'none', label, frac}
// - Legales (due): fracción de tiempo consumido entre startDate y nextDate.
//     verde <3/5 (60%) · ámbar 60–90% · rojo >90% o vencido
// - Mantenimiento: fracción del intervalo consumido (por km y/o meses; se toma la peor).
//     verde <4/5 (80%) · ámbar 80–100% · rojo >100%
function statusOf(k){
  const a=AREAS[k];
  const last=rowsFor(k)[0];
  if(a.due){
    const r=rowsFor(k).find(x=>x.nextDate&&x.startDate);
    if(!r)return {level:'none'};
    const total=new Date(r.nextDate)-new Date(r.startDate);
    const done=new Date(TODAY)-new Date(r.startDate);
    const frac=total>0?done/total:1;
    const days=Math.round((new Date(r.nextDate)-new Date(TODAY))/86400000);
    if(frac>0.9||days<0)return {level:'danger',frac,days,date:r.nextDate};
    if(frac>=0.6)return {level:'warn',frac,days,date:r.nextDate};
    return {level:'ok',frac,days,date:r.nextDate};
  }
  // Mantenimiento
  if(!last||(!a.intKm&&!a.intMonths))return {level:'none'};
  let frac=0;
  const carKm=currentCar()?.km;
  if(a.intKm&&last.km&&carKm!=null){
    const used=(Number(carKm)-Number(last.km))/a.intKm;
    frac=Math.max(frac,used);
  }
  if(a.intMonths){
    const months=(new Date(TODAY)-new Date(last.date))/(86400000*30.44);
    frac=Math.max(frac,months/a.intMonths);
  }
  if(frac>1)return {level:'danger',frac};
  if(frac>=0.8)return {level:'warn',frac};
  return {level:'ok',frac};
}

// Texto corto para la esquina de la tarjeta
function cornerLabel(k,s){
  const a=AREAS[k];
  if(a.due){
    if(s.level==='danger')return s.days<0?'Vencido':'Últimos días';
    if(s.level==='warn')return s.days+'d';
    return fmtShort(s.date);
  }
  const pct=Math.round(s.frac*100);
  if(s.level==='danger')return 'Atrasado';
  if(s.level==='warn')return pct+'%';
  return 'Al día';
}

// Recopila los avisos que necesitan atención (danger y warn) del coche activo.
// Devuelve una lista ordenada: primero los rojos, luego los ámbar.
function buildAlerts(){
  const out=[];
  for(const k of Object.keys(AREAS)){
    const s=statusOf(k);
    if(s.level==='danger'||s.level==='warn'){
      out.push({key:k,title:AREAS[k].title,icon:AREAS[k].icon,level:s.level,label:cornerLabel(k,s)});
    }
  }
  const rank={danger:0,warn:1};
  out.sort((a,b)=>rank[a.level]-rank[b.level]);
  return out;
}

function carOverallStatus(car){
  const recs=records[car.id];
  if(!recs||!recs.length)return 'none';
  let worst='none';
  const rank={none:0,ok:1,warn:2,danger:3};
  for(const k of Object.keys(AREAS)){
    const a=AREAS[k];
    const rows=recs.filter(r=>r.area===k).sort((x,y)=>(y.date||'').localeCompare(x.date||''));
    if(!rows.length)continue;
    let level='none';
    if(a.due){
      const r=rows.find(x=>x.nextDate&&x.startDate);
      if(r){
        const total=new Date(r.nextDate)-new Date(r.startDate);
        const done=new Date(TODAY)-new Date(r.startDate);
        const frac=total>0?done/total:1;
        const days=Math.round((new Date(r.nextDate)-new Date(TODAY))/86400000);
        if(frac>0.9||days<0)level='danger';else if(frac>=0.6)level='warn';else level='ok';
      }
    }else if(a.intKm||a.intMonths){
      const last=rows[0];let frac=0;
      if(a.intKm&&last.km&&car.km!=null)frac=Math.max(frac,(Number(car.km)-Number(last.km))/a.intKm);
      if(a.intMonths)frac=Math.max(frac,((new Date(TODAY)-new Date(last.date))/(86400000*30.44))/a.intMonths);
      if(frac>1)level='danger';else if(frac>=0.8)level='warn';else level='ok';
    }
    if(rank[level]>rank[worst])worst=level;
  }
  return worst;
}

  const MC=window.MC;
  const invoices=visitPhoto?[{data:visitPhoto,name:'factura.jpg',type:'image/jpeg',uploadedAt:Date.now()}]:[];
  const base={date:visitSheet.date||TODAY,workshop:visitSheet.workshop||'',location:visitSheet.location||'',
    phone:visitSheet.phone||'',contact:visitSheet.contact||'',
    notes:visitSheet.notes||'',km:visitSheet.km||'',invoices,createdAt:new Date().toISOString()};
  try{
    for(const k of selected){
      const a=AREAS[k];const d=visitDetails[k]||{};
      const rec={...base,area:k};
      // dato km del coche
      if(a.fields.some(f=>f.key==='km'))rec.km=visitSheet.km||'';
      // datos específicos del área
      Object.keys(d).forEach(fk=>{if(d[fk])rec[fk]=d[fk];});
      // ITV: calcular próxima si aplica (no suele venir por taller, pero por si acaso)
      await MC.fb.addDoc(MC.fb.collection(MC.db,'cars',activeCar,'records'),rec);
    }
    // actualizar km del coche si se indicó y es mayor
    if(visitSheet.km&&Number(visitSheet.km)>(Number(currentCar().km)||0)){
      try{await MC.fb.updateDoc(MC.fb.doc(MC.db,'cars',activeCar),{km:Number(visitSheet.km)});}catch(e){}
    }
    closeVisit();render();
  }catch(e){alert('No se pudo guardar la visita: '+e.message);}
}

// Facturas del formulario en curso (base64)
let sheetInvoices=[];
const MAX_INVOICE_BYTES=700*1024;
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('No se pudo leer'));r.readAsDataURL(file);});}
async function compressIfImage(file){
  if(!file.type.startsWith('image/'))return file;
  if(!window.imageCompression)return file; // fallback si no cargó la librería
  try{
    let out=await window.imageCompression(file,{maxSizeMB:0.65,maxWidthOrHeight:1600,useWebWorker:true});
    if(out.size>MAX_INVOICE_BYTES)out=await window.imageCompression(out,{maxSizeMB:0.55,maxWidthOrHeight:1200,useWebWorker:true});
    return out;
  }catch(e){return file;}
}
function renderInvList(){
  const box=document.getElementById('inv-list');if(!box)return;
  box.innerHTML=sheetInvoices.map((inv,i)=>`<span class="inv-thumb">${inv.type&&inv.type.startsWith('image/')?`<img src="${inv.data}" alt="">`:icon('file',15)} ${inv.name.length>16?inv.name.slice(0,14)+'…':inv.name} <button class="icon-btn" style="padding:2px" data-invdel="${i}" aria-label="Quitar">${icon('trash',13)}</button></span>`).join('');
  box.querySelectorAll('[data-invdel]').forEach(b=>b.onclick=()=>{sheetInvoices.splice(+b.dataset.invdel,1);renderInvList();});
}

function intervalText(a){
  const parts=[];
  if(a.intKm)parts.push(a.intKm.toLocaleString('es-ES')+' km');
  if(a.intMonths)parts.push(a.intMonths>=12?(a.intMonths/12)+' año'+(a.intMonths>=24?'s':''):a.intMonths+' meses');
  return parts.join(' o ');
}

// Sugerencia de próximo cambio para categorías con intervalo
function refreshAutoHint(){
  const hint=document.getElementById('auto-hint');
  const chk=document.getElementById('f_autocalc');
  if(!hint||!chk)return;
  if(!chk.checked){hint.style.display='none';return;}
  const a=AREAS[sheet.area];
  const bits=[];
  if(a.intKm){
    const kmField=document.getElementById('f_km');
    const base=kmField&&kmField.value?Number(kmField.value):currentCar().km;
    bits.push(`a los <b>${(base+a.intKm).toLocaleString('es-ES')} km</b>`);
  }
  if(a.intMonths){
    const d=(document.getElementById('f_date')||{}).value||TODAY;
    bits.push(`o el <b>${fmtDate(addMonthsISO(d,a.intMonths))}</b>`);
  }
  hint.style.display='flex';
  hint.innerHTML=`${icon('bell',16)}<span>Próximo cambio sugerido: ${bits.join(' ')}.</span>`;
}
function addMonthsISO(iso,n){
  const[y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y,m-1+n,d);
  return dt.toISOString().slice(0,10);
}

// Recalcula y muestra la sugerencia de próxima ITV a partir de la fecha ITV + matriculación
function refreshITVHint(){
  const hint=document.getElementById('itv-hint');
  if(!hint)return;
  const reg=currentCar().regDate;
  const itvDate=(document.getElementById('f_startDate')||{}).value;
  if(!reg||!itvDate){hint.style.display='none';return;}
  const res=nextITV(reg,itvDate);
  if(!res){hint.style.display='none';return;}
  hint.style.display='flex';
  hint.innerHTML=`${icon('bell',16)}<span>Próxima ITV sugerida: <b>${fmtDate(res.date)}</b> · ${res.reason}.</span><button type="button" class="itv-apply" data-next="${res.date}">Aplicar</button>`;
  const btn=hint.querySelector('.itv-apply');
  if(btn)btn.onclick=()=>{const nx=document.getElementById('f_nextDate');if(nx){nx.value=res.date;nx.style.borderColor='var(--ok)';}};
}

function bind(){
  root.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>{
    const a=el.dataset.act;
    if(a==='login'){doLogin()}
    if(a==='logout'){doLogout()}
    if(a==='back'){openArea=null;catNoteEditing=false;render()}
    if(a==='new'){sheet={area:openArea,existing:null};sheetInvoices=[];render()}
    if(a==='closesheet'){sheet=null;render()}
    if(a==='savesheet'){saveSheet()}
    if(a==='closecar'){carSheet=null;carPhoto=null;render()}
    if(a==='savecar'){saveCar()}
    if(a==='delcar'){deleteCarNow()}
    if(a==='editcar'){carSheet={existing:currentCar()};carPhoto=null;render()}
    if(a==='togarage'){activeCar=null;openArea=null;section='mant';alertsOpen=null;render()}
    if(a==='togglealerts'){const cur=alertsOpen!==null?alertsOpen:(buildAlerts().some(x=>x.level==='danger'));alertsOpen=!cur;render()}
    if(a==='openvisit'){visitSheet={date:TODAY};visitPhoto=null;visitAreas={};visitDetails={};visitExpanded=null;render()}
    if(a==='closevisit'){closeVisit();render()}
    if(a==='savevisit'){saveVisit()}
    if(a==='editcatnote'){catNoteEditing=true;render()}
    if(a==='cancelcatnote'){catNoteEditing=false;render()}
    if(a==='savecatnote'){saveCatNote()}
  });
  root.querySelectorAll('[data-stop]').forEach(el=>el.onclick=e=>e.stopPropagation());
  root.querySelectorAll('[data-car]').forEach(el=>el.onclick=()=>{activeCar=el.dataset.car;openArea=null;section='mant';alertsOpen=null;render()});
  root.querySelectorAll('[data-sec]').forEach(el=>el.onclick=()=>{section=el.dataset.sec;render()});
  root.querySelectorAll('[data-area]').forEach(el=>el.onclick=()=>{openArea=el.dataset.area;catNoteEditing=false;render()});
  root.querySelectorAll('[data-addcar]').forEach(el=>el.onclick=()=>{carSheet={existing:null};carPhoto=null;render()});
  root.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>{const r=(records[activeCar]||[]).find(x=>x.id===el.dataset.edit);sheet={area:openArea,existing:r};sheetInvoices=r&&r.invoices?[...r.invoices]:[];render()});
  root.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>delRecord(el.dataset.del));
  // Flujo taller: marcar/desmarcar áreas
  root.querySelectorAll('[data-vtoggle]').forEach(el=>el.onclick=()=>{const k=el.dataset.vtoggle;captureVisitCommon();if(visitAreas[k]){delete visitAreas[k];if(visitExpanded===k)visitExpanded=null;}else{visitAreas[k]=true;}render();});
  root.querySelectorAll('[data-vexpand]').forEach(el=>el.onclick=()=>{const k=el.dataset.vexpand;captureVisitCommon();captureVisitDetails();visitExpanded=visitExpanded===k?null:k;render();});
  root.querySelectorAll('[data-vdetail]').forEach(el=>el.addEventListener('input',()=>{const[k,f]=el.dataset.vdetail.split('|');if(!visitDetails[k])visitDetails[k]={};visitDetails[k][f]=el.value;}));
  // Foto de la factura (visita)
  const vcamBtn=document.getElementById('v_cam_btn'),vcamInput=document.getElementById('v_cam_input'),vphotoDel=document.getElementById('v_photo_del');
  if(vcamBtn&&vcamInput){
    vcamBtn.onclick=()=>vcamInput.click();
    vcamInput.onchange=async(e)=>{const f=(e.target.files||[])[0];if(!f)return;captureVisitCommon();captureVisitDetails();vcamBtn.textContent='Procesando…';
      try{const comp=await compressIfImage(f);if(comp.size>MAX_INVOICE_BYTES){alert('La foto pesa demasiado. Prueba con menos resolución.');vcamBtn.textContent='Hacer foto';return;}visitPhoto=await fileToBase64(comp);render();}
      catch(err){alert('No se pudo añadir la foto');vcamBtn.textContent='Hacer foto';}};
  }
  if(vphotoDel){vphotoDel.onclick=()=>{captureVisitCommon();captureVisitDetails();visitPhoto=null;render();};}
  // ITV
  const itvStart=document.getElementById('f_startDate');
  if(itvStart&&sheet&&sheet.area==='itv'){itvStart.addEventListener('input',refreshITVHint);refreshITVHint();}
  // Autocálculo
  const autochk=document.getElementById('f_autocalc');
  if(autochk){
    autochk.addEventListener('change',refreshAutoHint);
    const kmF=document.getElementById('f_km');if(kmF)kmF.addEventListener('input',refreshAutoHint);
    const dF=document.getElementById('f_date');if(dF)dF.addEventListener('input',refreshAutoHint);
  }
  // Facturas
  const invInput=document.getElementById('inv-input');
  const invDrop=document.getElementById('inv-drop');
  if(invInput&&invDrop){
    invDrop.onclick=()=>invInput.click();
    invInput.onchange=async(e)=>{
      const files=Array.from(e.target.files||[]);
      const label=document.getElementById('inv-label');
      for(const f of files){
        if(label)label.textContent='Procesando…';
        try{
          const comp=await compressIfImage(f);
          if(comp.size>MAX_INVOICE_BYTES){
            alert(`"${f.name}" pesa demasiado tras comprimir (máx. ~0,7 MB). Prueba con una foto de menos resolución.`);
            continue;
          }
          const data=await fileToBase64(comp);
          sheetInvoices.push({data,name:f.name,type:f.type,size:comp.size,uploadedAt:Date.now()});
        }catch(err){alert('No se pudo añadir '+f.name);}
      }
      if(label)label.textContent='Añadir factura';
      renderInvList();
      e.target.value='';
    };
    renderInvList();
  }
  // Foto del coche
  const cPhotoBtn=document.getElementById('c_photo_btn');
  const cPhotoInput=document.getElementById('c_photo_input');
  const cPhotoDel=document.getElementById('c_photo_del');
  if(cPhotoBtn&&cPhotoInput){
    cPhotoBtn.onclick=()=>cPhotoInput.click();
    cPhotoInput.onchange=async(e)=>{
      const f=(e.target.files||[])[0];if(!f)return;
      cPhotoBtn.textContent='Procesando…';
      try{
        const comp=await compressIfImage(f);
        if(comp.size>MAX_INVOICE_BYTES){
          alert('La foto pesa demasiado tras comprimir. Prueba con una de menos resolución.');
          cPhotoBtn.textContent='Añadir foto';return;
        }
        carPhoto=await fileToBase64(comp);
        render();
      }catch(err){alert('No se pudo añadir la foto');cPhotoBtn.textContent='Añadir foto';}
    };
  }
  if(cPhotoDel){cPhotoDel.onclick=()=>{carPhoto='';render();};}
}

// ── Firebase: cargar coches y registros del garaje familiar ──
function startListening(){
  const MC=window.MC, {collection,query,where,orderBy,onSnapshot}=MC.fb;
  const qCars=query(collection(MC.db,'cars'),where('garage','==','family'),orderBy('createdAt','asc'));
  unsubCars=onSnapshot(qCars,snap=>{
    cars=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Si el coche activo ya no existe, vuelvo al garaje. No auto-selecciono
    // ninguno: el usuario elige desde el menú principal.
    if(activeCar&&!cars.find(c=>c.id===activeCar))activeCar=null;
    listenRecords();
    loadAllRecordsForDots();
    render();
  },err=>{console.warn(err);});
}
// Carga ligera de los registros de cada coche, solo para el punto de estado
// del garaje. Una lectura por coche (no en tiempo real) para no recargar.
async function loadAllRecordsForDots(){
  const MC=window.MC, {collection,getDocs}=MC.fb;
  for(const c of cars){
    if(records[c.id])continue; // ya cargados (p.ej. el coche activo)
    try{
      const snap=await getDocs(collection(MC.db,'cars',c.id,'records'));
      records[c.id]=snap.docs.map(d=>({id:d.id,...d.data()}));
    }catch(e){/* si falta índice o permiso, el punto no se muestra */}
  }
  render();
}
function listenRecords(){
  const MC=window.MC, {collection,query,orderBy,onSnapshot}=MC.fb;
  if(unsubRecords){unsubRecords();unsubRecords=null;}
  if(!activeCar)return;
  const q=query(collection(MC.db,'cars',activeCar,'records'),orderBy('date','desc'));
  unsubRecords=onSnapshot(q,snap=>{
    records[activeCar]=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  },err=>{console.warn(err);});
}

async function saveCar(){
  const name=(document.getElementById('c_name')||{}).value.trim();
  if(!name){alert('Ponle un nombre al coche.');return;}
  const plate=(document.getElementById('c_plate')||{}).value.trim();
  const kmStr=(document.getElementById('c_km')||{}).value;
  const regDate=(document.getElementById('c_regDate')||{}).value;
  const data={name,plate,km:kmStr?Number(kmStr):null,regDate:regDate||null};
  // Foto: si se tocó en este formulario, se incluye (carPhoto='' quita la foto)
  if(carPhoto!==null)data.photo=carPhoto||null;
  const MC=window.MC;
  try{
    if(carSheet.existing){
      const carId=carSheet.existing.id;
      const oldReg=carSheet.existing.regDate||null;
      await MC.fb.updateDoc(MC.fb.doc(MC.db,'cars',carId),data);
      // Si cambió la matriculación, recalcula la próxima ITV de los registros de ITV
      if((data.regDate||null)!==oldReg && data.regDate){
        const itvRows=(records[carId]||[]).filter(r=>r.area==='itv'&&(r.startDate||r.date));
        for(const r of itvRows){
          const base=r.startDate||r.date;
          const res=nextITV(data.regDate,base);
          if(res&&res.date!==r.nextDate){
            try{await MC.fb.updateDoc(MC.fb.doc(MC.db,'cars',carId,'records',r.id),{nextDate:res.date});}catch(e){console.warn(e);}
          }
        }
      }
    }else{
      const ref=await MC.fb.addDoc(MC.fb.collection(MC.db,'cars'),{
        garage:'family',createdBy:currentUser?.uid||null,createdAt:new Date().toISOString(),...data
      });
      activeCar=ref.id;
    }
    carSheet=null;carPhoto=null;render();
  }catch(e){alert('No se pudo guardar el coche: '+e.message);}
}

async function deleteCarNow(){
  if(!carSheet.existing)return;
  if(!confirm('¿Borrar este coche y todos sus registros? No se puede deshacer.'))return;
  const MC=window.MC;
  try{
    await MC.fb.deleteDoc(MC.fb.doc(MC.db,'cars',carSheet.existing.id));
    if(activeCar===carSheet.existing.id)activeCar=null;
    carSheet=null;carPhoto=null;render();
  }catch(e){alert('No se pudo borrar: '+e.message);}
}

// ── Firebase: guardar registro ──
async function saveSheet(){
  const a=AREAS[sheet.area];
  const payload={area:sheet.area,invoices:sheetInvoices,
    date:(document.getElementById('f_date')||{}).value||TODAY,
    workshop:(document.getElementById('f_workshop')||{}).value||'',
    location:(document.getElementById('f_location')||{}).value||'',
    notes:(document.getElementById('f_notes')||{}).value||''};
  a.fields.forEach(f=>{const el=document.getElementById('f_'+f.key);payload[f.key]=el?el.value:'';});
  const MC=window.MC;
  try{
    if(sheet.existing){
      await MC.fb.updateDoc(MC.fb.doc(MC.db,'cars',activeCar,'records',sheet.existing.id),payload);
    }else{
      payload.createdAt=new Date().toISOString();
      await MC.fb.addDoc(MC.fb.collection(MC.db,'cars',activeCar,'records'),payload);
    }
    sheet=null;sheetInvoices=[];
  }catch(e){alert('No se pudo guardar: '+e.message);}
}

// ── Firebase: borrar registro ──
async function delRecord(id){

  const MC=window.MC;
  try{await MC.fb.deleteDoc(MC.fb.doc(MC.db,'cars',activeCar,'records',id));}
  catch(e){alert('No se pudo borrar: '+e.message);}
}

// ── Arranque: espera a Firebase y observa el login ──
function boot(){
  const MC=window.MC;
  if(!MC){root.innerHTML='<div class="empty" style="padding-top:80px">No se pudo cargar Firebase. Revisa tu conexión.</div>';return;}
  MC.fb.onAuthStateChanged(MC.auth,user=>{
    if(user&&!MC.isFamily(user.email)){
      // cuenta válida de Google pero no autorizada
      MC.fb.signOut(MC.auth);
      currentUser=null;signedIn=false;window._denied=true;render();
      return;
    }
    window._denied=false;
    currentUser=user;
    signedIn=!!user;
    if(user){startListening();}
    else{if(unsubCars)unsubCars();if(unsubRecords)unsubRecords();cars=[];records={};activeCar=null;}
    render();
  });
}

if(window.MC){boot();}else{window.addEventListener('MCReady',boot);}
render();
</script>
</body>
</html>
